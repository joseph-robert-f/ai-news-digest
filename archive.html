<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Digest &mdash; Archive</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 860px; margin: 0 auto; padding: 0 1.25rem 3rem;
    color: #1a1a1a; line-height: 1.6; background: #fafafa;
  }
  header {
    border-bottom: 3px solid #0b5fff; padding: 1.5rem 0 0.75rem; margin-bottom: 1rem;
    display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 1.6rem; }
  header a.home { color: #0b5fff; text-decoration: none; font-size: 0.9rem; margin-left: auto; }
  header a.home:hover { text-decoration: underline; }
  h2 {
    font-size: 1.2rem; color: #0b5fff; border-left: 4px solid #0b5fff;
    padding-left: 0.6rem; margin-top: 2rem;
  }
  ul.digests { list-style: none; padding: 0; margin: 0.5rem 0; }
  ul.digests li {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 8px;
    padding: 0.75rem 1rem; margin-bottom: 0.6rem; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  a.title { font-weight: 600; color: #0b5fff; text-decoration: none; font-size: 1.02rem; }
  a.title:hover { text-decoration: underline; }
  .date { color: #666; font-size: 0.85rem; }
  .summary { color: #444; font-size: 0.9rem; margin-top: 0.3rem; }
  .actions { margin-top: 0.35rem; font-size: 0.82rem; }
  .actions a { color: #0b5fff; text-decoration: none; }
  .actions a:hover { text-decoration: underline; }
  .status { color: #666; padding: 2rem 0; }
  .status.error { color: #b00020; }
  .badge {
    display: inline-block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em;
    background: #eef4ff; color: #0b5fff; padding: 0.05rem 0.45rem; border-radius: 4px;
    margin-left: 0.4rem; vertical-align: middle;
  }
</style>
</head>
<body>
<header>
  <h1>AI News Digest &mdash; Archive</h1>
  <a class="home" href="./">&larr; Latest digest</a>
</header>
<div id="content"><div class="status">Loading&hellip;</div></div>
<script>
(async function () {
  const content = document.getElementById('content');
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const formatDate = (iso) => {
    const [y, m, d] = iso.split('-').map(Number);
    return d + ' ' + MONTHS[m - 1] + ' ' + y;
  };
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const encodePath = (p) => p.split('/').map(encodeURIComponent).join('/');

  try {
    const res = await fetch('./digests.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('Could not load digests.json (HTTP ' + res.status + ')');
    const data = await res.json();
    const list = (data.digests || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1));
    if (!list.length) { content.innerHTML = '<div class="status">No digests yet.</div>'; return; }

    // Group by year -> month, preserving newest-first order.
    const groups = [];
    const index = new Map();
    for (const d of list) {
      const year = d.date.slice(0, 5).slice(0, 4);
      const monthName = MONTHS[Number(d.date.slice(5, 7)) - 1];
      const key = year + '-' + monthName;
      if (!index.has(key)) { const g = { year, monthName, items: [] }; index.set(key, g); groups.push(g); }
      index.get(key).items.push(d);
    }

    const html = groups.map((g) => {
      const items = g.items.map((d, i) => {
        const isNewest = d === list[0];
        return '<li>' +
          '<a class="title" href="./?date=' + encodeURIComponent(d.date) + '">' +
            escapeHtml(d.title) + (isNewest ? '<span class="badge">latest</span>' : '') +
          '</a>' +
          '<div class="date">' + escapeHtml(formatDate(d.date)) +
            (d.week ? ' &middot; ' + escapeHtml(d.week) : '') + '</div>' +
          (d.summary ? '<div class="summary">' + escapeHtml(d.summary) + '</div>' : '') +
          '<div class="actions"><a href="' + encodePath(d.path) + '" target="_blank" rel="noopener">Open standalone &#8599;</a></div>' +
        '</li>';
      }).join('');
      return '<h2>' + escapeHtml(g.monthName + ' ' + g.year) + '</h2><ul class="digests">' + items + '</ul>';
    }).join('');

    content.innerHTML = html;
  } catch (err) {
    content.innerHTML = '<div class="status error">' +
      escapeHtml((err && err.message) ? err.message : String(err)) + '</div>';
  }
})();
</script>
</body>
</html>
